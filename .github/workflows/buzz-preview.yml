name: Buzz Preview

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'state/**'

concurrency:
  group: buzz-preview
  cancel-in-progress: false

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Buzz researcher
        working-directory: agents
        run: python researcher.py --mode buzz --buzz-max-nodes 2

      - name: Send buzz insights to Discord
        working-directory: scripts
        run: python send_buzz_insights.py

      - name: Commit state changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update state after buzz preview [skip ci]"
          git push
