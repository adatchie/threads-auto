name: Reject Post

on:
  workflow_dispatch:
    inputs:
      post_id:
        description: '却下する投稿のID（例: post_abc12345）'
        required: true
        type: string

jobs:
  reject:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python scripts/reject.py ${{ github.event.inputs.post_id }}
      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/post_queue.json
          git diff --staged --quiet || git commit -m "chore: reject post ${{ github.event.inputs.post_id }} [skip ci]"
          git push
