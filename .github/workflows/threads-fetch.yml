name: Threads Fetch Metrics

on:
  workflow_dispatch:
    inputs:
      force:
        description: '24h制限を無視して強制取得'
        type: boolean
        default: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetcher
        working-directory: agents
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            python fetcher.py --force
          else
            python fetcher.py
          fi

      - name: Commit state changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update metrics after fetch [skip ci]"
          git push
