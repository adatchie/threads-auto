name: Threads Daily Batch

on:
  schedule:
    # 毎朝7:00 JST（= 22:00 UTC 前日）
    - cron: '0 22 * * *'
  workflow_dispatch:  # 手動実行も可能

concurrency:
  group: threads-daily-batch
  cancel-in-progress: false

jobs:
  batch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Supervisor check
        working-directory: agents
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: python supervisor.py --check

      - name: Fetcher (get metrics)
        working-directory: agents
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
        run: python fetcher.py

      - name: Analyst
        working-directory: agents
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: python analyst.py

      - name: Researcher
        working-directory: agents
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
          BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
        run: python researcher.py

      - name: Writer (generate 10 posts)
        working-directory: agents
        env:
          GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
        run: python writer.py --count 10

      - name: Commit state changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update state after daily batch [skip ci]"
          git push
