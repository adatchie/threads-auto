name: Operator Feedback

on:
  workflow_dispatch:
    inputs:
      note:
        description: "運用メモ"
        required: true
      mode:
        description: "フィードバック種別"
        type: choice
        options:
          - note
          - boost
          - avoid
          - pause
        default: note
      scope:
        description: "適用範囲"
        type: choice
        options:
          - overall
          - research
          - writing
          - posting
        default: overall
      topics:
        description: "対象トピック（カンマ区切り）"
        required: false
      patterns:
        description: "対象パターン（カンマ区切り）"
        required: false
      active_days:
        description: "有効日数"
        type: number
        default: 7

jobs:
  feedback:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Save operator feedback
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python scripts/operator_feedback.py \
            --note "${{ github.event.inputs.note }}" \
            --mode "${{ github.event.inputs.mode }}" \
            --scope "${{ github.event.inputs.scope }}" \
            --topics "${{ github.event.inputs.topics }}" \
            --patterns "${{ github.event.inputs.patterns }}" \
            --active-days "${{ github.event.inputs.active_days }}"

      - name: Commit state changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: add operator feedback [skip ci]"
          git push
