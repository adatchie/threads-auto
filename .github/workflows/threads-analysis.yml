name: Threads Analysis
on:
  schedule:
    # 毎朝11:00 JST（= 02:00 UTC）
    - cron: '0 2 * * *'
  workflow_dispatch:  # 手動実行も可能
concurrency:
  group: threads-analysis
  cancel-in-progress: false
jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # LLM（優先: ANTHROPIC > GEMINI > GLM）
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GLM_API_KEY: ${{ secrets.GLM_API_KEY }}
      # 検索
      BRAVE_SEARCH_API_KEY: ${{ secrets.BRAVE_SEARCH_API_KEY }}
      GOOGLE_CSE_KEY: ${{ secrets.GOOGLE_CSE_KEY }}
      GOOGLE_CSE_ID: ${{ secrets.GOOGLE_CSE_ID }}
      # Threads
      THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
      THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
      # Optional
      YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GH_PAT }}
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Fetcher (get metrics)
        working-directory: agents
        run: python fetcher.py
      - name: Analyst
        working-directory: agents
        run: python analyst.py
      - name: Supervisor check
        working-directory: agents
        run: python supervisor.py --check
      - name: Commit state changes
        run: |
          git config user.name "threads-bot"
          git config user.email "threads-bot@users.noreply.github.com"
          git add state/
          git diff --cached --quiet || git commit -m "chore: update state after analysis [skip ci]"
          git push
